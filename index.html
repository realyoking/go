<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goon Simulator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            background-image: url('bedroom.jpeg');
            background-size: cover;
            background-position: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* Coin Counter */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
        }

        /* Character */
        #character {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #character:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        /* Video Position: Bottom Middle */
        #video-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            border: 4px solid #fff;
            border-radius: 12px;
            overflow: hidden;
            background: black;
        }

        video {
            width: 100%;
            display: block;
        }

        .icon {
            width: 30px;
            height: 30px;
            fill: gold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <svg class="icon" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" fill="gold"/>
            </svg>
            <span id="coin-count">0</span>
        </div>

        <img id="character" src="char.jpeg" alt="Game Character">

        <div id="video-container">
            <video id="gameVideo" loop>
                <source src="good.mov" type="video/quicktime">
            </video>
        </div>
    </div>

    <script>
        let coins = 0;
        const coinDisplay = document.getElementById('coin-count');
        const character = document.getElementById('character');
        const video = document.getElementById('gameVideo');

        // Click character to gain coins
        character.addEventListener('click', () => {
            coins++;
            coinDisplay.innerText = coins;
            
            // Trigger video play on click
            if (video.paused) {
                video.play();
            }
        });

        // Optional: Click video to pause/play
        video.addEventListener('click', () => {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        });
    </script>
</body>
</html>

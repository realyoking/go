<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Click Simulator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #overlay {
            position: absolute;
            z-index: 10;
            color: white;
            text-align: center;
            pointer-events: none;
        }

        .icon {
            width: 80px;
            height: 80px;
            fill: white;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <svg class="icon" viewBox="0 0 24 24">
            <path d="M8 5v14l11-7z"/>
        </svg>
        <p>Click anywhere to play</p>
    </div>

    <video id="videoPlayer" playsinline>
        <source src="good.mov" type="video/quicktime">
        Your browser does not support the video tag.
    </video>

    <script>
        const video = document.getElementById('videoPlayer');
        const overlay = document.getElementById('overlay');

        document.body.addEventListener('click', function() {
            if (video.paused) {
                video.play();
                overlay.style.display = 'none';
            } else {
                video.pause();
                overlay.style.display = 'block';
            }
        });
    </script>
</body>
</html>

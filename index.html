<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Goon Simulator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: sans-serif;
            background-image: url('bedroom.jpeg');
            background-size: cover;
            background-position: center;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #open-shop {
            background: #ffcc00;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Character with Shake Animation */
        #character {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            cursor: pointer;
        }

        @keyframes shake {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(5deg); }
            50% { transform: translate(-50%, -50%) rotate(-5deg); }
            75% { transform: translate(-50%, -50%) rotate(5deg); }
            100% { transform: translate(-50%, -50%) rotate(0deg); }
        }

        .shake-animation {
            animation: shake 0.2s ease-in-out;
        }

        /* GIF Container (No Border) */
        #gif-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 450px; /* Increased size */
            overflow: hidden;
        }

        #gif-container img {
            width: 100%;
            display: block;
        }

        /* Shop Modal */
        #shop-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }
        .shop-item {
            border: 1px solid #444;
            padding: 10px;
            margin: 10px 0;
            cursor: pointer;
        }
        .shop-item:hover { background: #333; }
        .icon { width: 20px; height: 20px; fill: gold; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <div><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg> Coins: <span id="coin-count">0</span></div>
            <div>Power: <span id="click-power">1</span> per click</div>
            <button id="open-shop">Open Shop</button>
        </div>

        <img id="character" src="char.jpeg" alt="Game Character">

        <div id="gif-container">
            <img src="IMG_9302.gif" alt="Animated GIF">
        </div>
    </div>

    <div id="shop-modal">
        <h3>Upgrade Shop</h3>
        <div class="shop-item" onclick="buyUpgrade('power')">
            <strong>Stronger Click</strong><br>
            Cost: <span id="cost-power">10</span> Coins
        </div>
        <div class="shop-item" onclick="buyUpgrade('auto')">
            <strong>Auto Gooner</strong><br>
            Cost: <span id="cost-auto">50</span> Coins
        </div>
        <button onclick="document.getElementById('shop-modal').style.display='none'">Close</button>
    </div>

    <script>
        let coins = 0;
        let clickPower = 1;
        let autoIncome = 0;
        let powerCost = 10;
        let autoCost = 50;

        const coinDisplay = document.getElementById('coin-count');
        const powerDisplay = document.getElementById('click-power');
        const char = document.getElementById('character');

        // Character click event with shake
        char.addEventListener('click', () => {
            coins += clickPower;
            coinDisplay.innerText = coins;
            
            // Add shake class
            char.classList.add('shake-animation');
            
            // Remove class after animation finishes
            setTimeout(() => {
                char.classList.remove('shake-animation');
            }, 200);
        });

        function buyUpgrade(type) {
            if (type === 'power' && coins >= powerCost) {
                coins -= powerCost;
                clickPower++;
                powerCost = Math.floor(powerCost * 1.5);
                document.getElementById('cost-power').innerText = powerCost;
                powerDisplay.innerText = clickPower;
            } else if (type === 'auto' && coins >= autoCost) {
                coins -= autoCost;
                autoIncome++;
                autoCost = Math.floor(autoCost * 1.5);
                document.getElementById('cost-auto').innerText = autoCost;
            }
            coinDisplay.innerText = coins;
        }

        setInterval(() => {
            if (autoIncome > 0) {
                coins += autoIncome;
                coinDisplay.innerText = coins;
            }
        }, 1000);

        document.getElementById('open-shop').onclick = () => {
            document.getElementById('shop-modal').style.display = 'block';
        };
    </script>
</body>
</html>
